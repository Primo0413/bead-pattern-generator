range]{width:100px;accent-color:var(--accent)}.canvas-wrapper{flex:1;display:flex;align-items:center;justify-content:center;overflow:auto;padding:24px;background-image:radial-gradient(circle at 1px 1px,rgba(255,255,255,.04) 1px,transparent 0);background-size:20px 20px}#pixel-canvas{background:#fff;border-radius:var(--radius-sm);box-shadow:var(--shadow-lg);cursor:crosshair;image-rendering:pixelated;image-rendering:crisp-edges;max-width:100%;max-height:100%;object-fit:contain}.stats-summary{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}.stat-item{background:var(--bg-input);border:1px solid var(--border-subtle);border-radius:var(--radius-md);padding:10px;text-align:center}.stat-label{display:block;font-size:11px;color:var(--text-secondary);margin-bottom:4px}.stat-value{display:block;font-size:18px;font-weight:700;font-family:var(--mono);color:var(--text-primary)}.stats-table{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:6px;padding-right:4px}.stats-empty{text-align:center;color:var(--text-muted);font-size:13px;padding:24px 0}.stats-row{display:grid;grid-template-columns:28px 50px 1fr 50px;align-items:center;gap:10px;padding:8px 10px;background:var(--bg-input);border:1px solid var(--border-subtle);border-radius:var(--radius-md);transition:background .15s ease}.stats-row:hover{background:var(--bg-panel-hover)}.stats-row .swatch{width:20px;height:20px;border-radius:4px;border:1px solid var(--border-medium)}.stats-row .alias{font-weight:700;font-family:var(--mono);font-size:13px}.stats-row .hex{color:var(--text-secondary);font-family:var(--mono);font-size:11px}.stats-row .count{text-align:right;font-weight:700;font-family:var(--mono);color:var(--accent-hover)}.image-preview{width:100%;aspect-ratio:16 / 10;border-radius:var(--radius-md);border:1px solid var(--border-subtle);background:var(--bg-input);background-size:contain;background-position:center;background-repeat:no-repeat;margin:14px 0}.toast{position:absolute;bottom:24px;left: </style>
  </head>
  <body>
    <div id="app">
      <!-- 顶部导航 -->
      <header class="app-header">
        <div class="brand">
          <div class="brand-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
              <rect x="3" y="3" width="7" height="7" rx="1.5" />
              <rect x="14" y="3" width="7" height="7" rx="1.5" />
              <rect x="3" y="14" width="7" height="7" rx="1.5" />
              <rect x="14" y="14" width="7" height="7" rx="1.5" />
            </svg>
          </div>
          <div class="brand-text">
            <h1>拼豆图纸生成器</h1>
            <span>Bead Pattern Studio</span>
          </div>
        </div>

        <nav class="mode-tabs" aria-label="工作模式">
          <button class="mode-tab active" data-mode="design" type="button">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
              <path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a.996.996 0 0 0 0-1.41l-2.34-2.34a.996.996 0 0 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z" />
            </svg>
            设计模式
          </button>
          <button class="mode-tab" data-mode="convert" type="button">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
              <path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z" />
            </svg>
            转换模式
          </button>
        </nav>

        <div class="header-actions">
          <button id="btn-save" class="btn btn-ghost" type="button" title="保存工程 (Ctrl+S)">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
              <path d="M17 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V7l-4-4zm-5 16c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3zm3-10H5V5h10v4z" />
            </svg>
            保存
          </button>
          <button id="btn-load" class="btn btn-ghost" type="button" title="加载工程">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
              <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z" />
            </svg>
            加载
          </button>
          <button id="btn-export-pdf" class="btn btn-primary" type="button" title="导出 PDF">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
              <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z" />
            </svg>
            导出 PDF
          </button>
        </div>
      </header>

      <!-- 主工作区 -->
      <main class="app-main">
        <!-- 左侧：色号与工具 -->
        <aside class="sidebar sidebar-left">
          <section class="panel">
            <div class="panel-header">
              <h2>工具</h2>
            </div>
            <div class="tool-group">
              <button class="tool-btn active" data-tool="brush" title="画笔 (B)">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                  <path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a.996.996 0 0 0 0-1.41l-2.34-2.34a.996.996 0 0 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z" />
                </svg>
              </button>
              <button class="tool-btn" data-tool="eraser" title="橡皮擦 (E)">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                  <path d="M15.14 3c-.51 0-1.02.2-1.41.59L2.59 14.73c-.78.78-.78 2.05 0 2.83l4.24 4.24c.39.39.9.59 1.41.59.51 0 1.02-.2 1.41-.59L19.41 9.59c.78-.78.78-2.05 0-2.83l-2.83-2.83c-.39-.39-.9-.59-1.41-.59zM5.24 16.17l2.83-2.83 6.36 6.36H5.24v-3.53z" />
                </svg>
              </button>
              <button class="tool-btn" data-tool="picker" title="取色器 (I)">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                  <path d="M20.71 5.63l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-3.12 3.12-1.93-1.91-1.41 1.41 1.42 1.42L3 16.25V21h4.75l8.92-8.92 1.42 1.42 1.41-1.41-1.92-1.92 3.12-3.12c.4-.4.4-1.03.01-1.42zM5.25 19H4v-1.25l7.27-7.27 1.25 1.25L5.25 19z" />
                </svg>
              </button>
              <button class="tool-btn" data-tool="fill" title="油漆桶 (F)">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                  <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z" />
                </svg>
              </button>
            </div>
          </section>

          <section class="panel panel-grow">
            <div class="panel-header">
              <h2>色号</h2>
              <span id="palette-count" class="badge">0</span>
            </div>
            <div id="palette-grid" class="palette-grid"></div>
            <div class="selected-color-info">
              <div id="selected-swatch" class="color-swatch" style="background: #000;"></div>
              <div class="selected-color-meta">
                <span id="selected-alias" class="alias">-</span>
                <span id="selected-hex" class="hex">#000000</span>
              </div>
            </div>
          </section>
        </aside>

        <!-- 中间：画布 -->
        <section class="canvas-area">
          <div class="canvas-toolbar">
            <div class="canvas-info">
              <span id="canvas-dims">- × -</span>
              <span id="canvas-zoom">100%</span>
            </div>
            <div class="canvas-controls">
              <button id="btn-toggle-grid" class="btn btn-icon active" title="显示网格">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                  <path d="M3 3v18h18V3H3zm16 16H5V5h14v14z" />
                  <path d="M7 3v18M17 3v18M3 7h18M3 17h18" stroke="currentColor" stroke-width="1.5" />
                </svg>
              </button>
              <button id="btn-toggle-labels" class="btn btn-icon active" title="显示色号标注">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                  <path d="M5 4v3h5.5v12h3V7H19V4z" />
                </svg>
              </button>
              <div class="zoom-controls">
                <button id="btn-zoom-out" class="btn btn-icon" title="缩小">-</button>
                <input id="zoom-slider" type="range" min="50" max="400" value="100" />
                <button id="btn-zoom-in" class="btn btn-icon" title="放大">+</button>
              </div>
            </div>
          </div>

          <div id="canvas-wrapper" class="canvas-wrapper">
            <canvas id="pixel-canvas"></canvas>
          </div>

          <div id="toast" class="toast" role="status" aria-live="polite"></div>
        </section>

        <!-- 右侧：模式控制与统计 -->
        <aside class="sidebar sidebar-right">
          <!-- 设计模式面板 -->
          <section id="panel-design" class="panel panel-mode">
            <div class="panel-header">
              <h2>设计</h2>
            </div>
            <div class="form-group">
              <label for="input-width">宽度</label>
              <input id="input-width" type="number" min="8" max="512" value="64" />
            </div>
            <div class="form-group">
              <label for="input-height">高度</label>
              <input id="input-height" type="number" min="8" max="512" value="64" />
            </div>
            <button id="btn-new-canvas" class="btn btn-secondary btn-block" type="button">
              新建空白画布
            </button>
            <div class="divider"></div>
            <button id="btn-upload-pixel" class="btn btn-secondary btn-block" type="button">
              上传像素图 PNG
            </button>
            <input id="file-pixel" type="file" accept="image/png,image/jpeg,image/webp" hidden />
          </section>

          <!-- 转换模式面板 -->
          <section id="panel-convert" class="panel panel-mode hidden">
            <div class="panel-header">
              <h2>图片转换</h2>
            </div>
            <button id="btn-upload-image" class="btn btn-secondary btn-block" type="button">
              选择图片
            </button>
            <input id="file-image" type="file" accept="image/png,image/jpeg,image/bmp,image/webp" hidden />
            <div id="image-preview" class="image-preview hidden"></div>
            <div class="form-group">
              <label for="input-target-width">目标宽度（格）</label>
              <input id="input-target-width" type="number" min="8" max="512" value="96" />
            </div>
            <div class="form-group checkbox">
              <input id="chk-dithering" type="checkbox" checked />
              <label for="chk-dithering">启用 Floyd-Steinberg 抖动</label>
            </div>
            <button id="btn-convert" class="btn btn-primary btn-block" type="button">
              生成像素图
            </button>
          </section>

          <!-- 统计面板 -->
          <section class="panel panel-grow">
            <div class="panel-header">
              <h2>色号统计</h2>
              <span id="used-color-count" class="badge">0</span>
            </div>
            <div class="stats-summary">
              <div class="stat-item">
                <span class="stat-label">总豆数</span>
                <span id="total-beads" class="stat-value">0</span>
              </div>
              <div class="stat-item">
                <span class="stat-label">颜色种数</span>
                <span id="color-types" class="stat-value">0</span>
              </div>
            </div>
            <div id="stats-table" class="stats-table">
              <div class="stats-empty">暂无数据</div>
            </div>
          </section>
        </aside>
      </main>
    </div>

  </body>
</html>
